    <title>Tetris Controls</title>
</head>
<body>
    <div class="centered">
        <h1>Controls</h1>
        <p class="biggerText"><b>Left Arrow or A: </b> Move Left</p>
        <p class="biggerText"><b>Right Arrow or D: </b> Move Right</p>
        <p class="biggerText"><b>Down Arrow or S: </b> Speed up piece (for points)</p>
        <p class="biggerText"><b>Enter: </b> Drop piece immediatly (for more points)</p>
        <p class="biggerText"><b>R: </b> Rotate piece</p>

            <button style="font-size: 1.5em">Return</button>
